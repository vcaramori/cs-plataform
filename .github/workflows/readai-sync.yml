name: Read.ai Sync (manual)

# O agendamento horário foi movido para o Supabase (pg_cron + pg_net → endpoint da
# Vercel), com o segredo lido do banco (app_settings) — ver migração
# 20260619210000_supabase_cron_syncs.sql. Este workflow fica só como disparo MANUAL.
# Para funcionar manualmente, os secrets CSPLATAFORM_BASE_URL e HELPDESK_API_SECRET
# (= app_settings.helpdesk_integration.secret) precisam estar configurados no repo.

on:
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Trigger Read.ai sync
        env:
          CSPLATAFORM_BASE_URL: ${{ secrets.CSPLATAFORM_BASE_URL }}
          HELPDESK_API_SECRET: ${{ secrets.HELPDESK_API_SECRET }}
        run: |
          echo "Disparando Read.ai sync..."
          code=$(curl -sS -o /tmp/resp.json -w "%{http_code}" \
            -X POST "$CSPLATAFORM_BASE_URL/api/cron/readai-sync" \
            -H "x-api-secret: $HELPDESK_API_SECRET" \
            --max-time 290)
          echo "HTTP $code"; cat /tmp/resp.json || true; echo
          if [ "$code" != "200" ]; then echo "::error::Read.ai sync falhou (HTTP $code)"; exit 1; fi
