name: Read.ai Sync (hourly)

# Aciona o endpoint que sincroniza as reuniões do Read.ai de todos os agentes
# conectados. GitHub Actions (não cron da Vercel, que no Hobby é só diário).

on:
  schedule:
    - cron: '15 * * * *' # de hora em hora (desfasado do HelpDesk em :00)
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Trigger Read.ai sync
        env:
          CSPLATAFORM_BASE_URL: ${{ secrets.CSPLATAFORM_BASE_URL }}
          HELPDESK_API_SECRET: ${{ secrets.HELPDESK_API_SECRET }}
        run: |
          echo "Disparando Read.ai sync..."
          code=$(curl -sS -o /tmp/resp.json -w "%{http_code}" \
            -X POST "$CSPLATAFORM_BASE_URL/api/cron/readai-sync" \
            -H "x-api-secret: $HELPDESK_API_SECRET" \
            --max-time 290)
          echo "HTTP $code"; cat /tmp/resp.json || true; echo
          if [ "$code" != "200" ]; then echo "::error::Read.ai sync falhou (HTTP $code)"; exit 1; fi
